name: llm_dart

packages:
  - packages/**

ignore:
  - repo-ref/**

scripts:
  format:
    run: dart format .
    description: Format Dart files in the workspace.
  test:
    run: dart test -j 1
    description: Run repository tests (root package).
  metadata:check:
    run: dart run tool/run_metadata_tests.dart
    description: Run focused providerMetadata/alias tests.
  deps:
    run: dart run tool/check_monorepo_deps.dart
    description: Verify monorepo dependency direction rules.
  exports:
    run: dart run tool/check_public_exports.dart
    description: Verify public export boundary rules.
  surface:
    run: dart run tool/check_provider_surface.dart
    description: Verify Tier 2 provider surface boundary rules.
  fixtures:check:
    run: dart run tool/sync_vercel_fixtures.dart --check
    description: Verify Vercel AI SDK fixtures are synced (repo-ref/ai -> test/fixtures).
  fixtures:sync:
    run: dart run tool/sync_vercel_fixtures.dart --write
    description: Sync Vercel AI SDK fixtures into test/fixtures (never deletes).
  goldens:check:
    run: dart run tool/update_v3_goldens.dart --check
    description: Verify AI SDK v3 parts goldens are up to date.
  goldens:update:
    run: dart run tool/update_v3_goldens.dart --write
    description: Update AI SDK v3 parts goldens from vendored fixtures.
  v3meta:check:
    run: dart run tool/check_v3_meta.dart --check
    description: Verify v3 parts meta files follow conventions and include upstream provenance.
  v3meta:upstream:check:
    run: dart run tool/backfill_v3_meta_upstream.dart --check
    description: Verify v3 meta upstream fields match test/fixtures/v3_parts/_upstream.json.
  v3meta:upstream:backfill:
    run: dart run tool/backfill_v3_meta_upstream.dart --write
    description: Backfill v3 meta upstream fields from test/fixtures/v3_parts/_upstream.json.
  parity:check:
    run: |
      dart run tool/sync_vercel_fixtures.dart --check &&
      dart run tool/check_v3_meta.dart --check &&
      dart run tool/backfill_v3_meta_upstream.dart --check &&
      dart run tool/update_v3_goldens.dart --check
    description: Verify fixtures, v3 meta, upstream provenance, and goldens in one pass.
  version:set-all:
    run: dart run tool/bump_version.dart set-all
    description: Set all package versions and internal dependency constraints (pass -- --version X.Y.Z).
  version:set:
    run: dart run tool/bump_version.dart set
    description: Set a single package version (pass -- --package name --version X.Y.Z).
