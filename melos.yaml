name: llm_dart_workspace

packages:
  - .
  - packages/**

command:
  bootstrap:
    usePubspecOverrides: true

scripts:
  guard:imports:
    run: dart --suppress-analytics run tool/check_workspace_dependency_guards.dart
    description: Ensure package implementation files do not import the root llm_dart package.
  guard:root:
    run: dart --suppress-analytics run tool/check_root_package_boundary_guards.dart
    description: Ensure the root package keeps the frozen public entrypoint boundary.
  analyze:
    run: |
      dart --suppress-analytics run tool/check_workspace_dependency_guards.dart
      dart --suppress-analytics run tool/check_root_package_boundary_guards.dart
      melos exec --ignore=llm_dart_flutter -- "dart --suppress-analytics analyze ."
      melos exec --scope=llm_dart_flutter -- "flutter analyze --fatal-infos"
    description: Analyze all packages in the workspace.
  test:
    run: |
      melos exec --fail-fast --ignore=llm_dart_flutter -- "dart --suppress-analytics test"
      melos exec --fail-fast --scope=llm_dart_flutter -- "flutter test"
    description: Run tests in all packages in the workspace.
