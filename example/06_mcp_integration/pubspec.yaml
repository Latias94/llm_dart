name: llm_dart_mcp_examples
description: MCP integration examples for llm_dart.
publish_to: none

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  llm_dart:
    path: ../..
  mcp_dart: ^2.1.1

dev_dependencies:
  lints: ^6.0.0

dependency_overrides:
  llm_dart_ai:
    path: ../../packages/llm_dart_ai
  llm_dart_anthropic:
    path: ../../packages/llm_dart_anthropic
  llm_dart_chat:
    path: ../../packages/llm_dart_chat
  llm_dart_elevenlabs:
    path: ../../packages/llm_dart_elevenlabs
  llm_dart_google:
    path: ../../packages/llm_dart_google
  llm_dart_ollama:
    path: ../../packages/llm_dart_ollama
  llm_dart_openai:
    path: ../../packages/llm_dart_openai
  llm_dart_provider:
    path: ../../packages/llm_dart_provider
  llm_dart_transport:
    path: ../../packages/llm_dart_transport
