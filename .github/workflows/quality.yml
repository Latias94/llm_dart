name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  documentation:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Bootstrap workspace overrides
        run: dart tool/bootstrap_workspace_pubspec_overrides.dart

      - name: Install dependencies
        run: dart pub get

      - name: Generate documentation
        run: dart doc

