name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  analyze:
    name: Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Bootstrap workspace overrides
        run: dart tool/bootstrap_workspace_pubspec_overrides.dart

      - name: Install dependencies
        run: dart pub get

      - name: Install Flutter package dependencies
        working-directory: packages/llm_dart_flutter
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Check workspace dependency guards
        run: dart run tool/check_workspace_dependency_guards.dart

      - name: Check root package boundary guards
        run: dart run tool/check_root_package_boundary_guards.dart

      - name: Analyze project source
        run: dart analyze --fatal-infos

      - name: Analyze Flutter package source
        working-directory: packages/llm_dart_flutter
        run: flutter analyze --fatal-infos

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Bootstrap workspace overrides
        run: dart tool/bootstrap_workspace_pubspec_overrides.dart

      - name: Install dependencies
        run: dart pub get

      - name: Install Flutter package dependencies
        working-directory: packages/llm_dart_flutter
        run: flutter pub get

      - name: Run tests
        run: dart test

      - name: Run Flutter package tests
        working-directory: packages/llm_dart_flutter
        run: flutter test

  test-coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Bootstrap workspace overrides
        run: dart tool/bootstrap_workspace_pubspec_overrides.dart

      - name: Install dependencies
        run: dart pub get

      - name: Install coverage
        run: dart pub global activate coverage

      - name: Run tests with coverage
        run: dart test --coverage=coverage --concurrency=1

      - name: Convert coverage to LCOV
        run: dart pub global run coverage:format_coverage --lcov --in=coverage --out=coverage/lcov.info --packages=.dart_tool/package_config.json --report-on=lib

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
        continue-on-error: true

  publish-dry-run:
    name: Publish Dry Run
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Bootstrap workspace overrides
        run: dart tool/bootstrap_workspace_pubspec_overrides.dart

      - name: Install dependencies
        run: dart pub get

      - name: Dry run pub publish
        run: dart tool/run_workspace_publish_dry_run.dart
