name: CI

on:
  push:
    branches: [main, develop, dev]
  pull_request:
    branches: [main, develop, dev]

jobs:
  analyze:
    name: Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read pinned Vercel AI SDK commit
        id: vercel_ai
        run: |
          python3 - << 'PY'
          import os
          import json
          with open('test/fixtures/v3_parts/_upstream.json', 'r', encoding='utf-8') as f:
            data = json.load(f)
          commit = data.get('commit')
          if not commit:
            raise SystemExit('Missing commit in test/fixtures/v3_parts/_upstream.json')
          print(f'commit={commit}')
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as out:
            out.write(f'commit={commit}\n')
          PY

      - name: Checkout Vercel AI SDK (fixtures reference)
        uses: actions/checkout@v4
        with:
          repository: vercel/ai
          ref: ${{ steps.vercel_ai.outputs.commit }}
          path: repo-ref/ai
          fetch-depth: 1

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Check monorepo dependency rules
        run: dart run tool/check_monorepo_deps.dart

      - name: Check public export boundaries
        run: dart run tool/check_public_exports.dart

      - name: Check provider public surface (Tier 2)
        run: dart run tool/check_provider_surface.dart

      - name: Verify Vercel AI SDK fixtures are synced
        run: dart run tool/sync_vercel_fixtures.dart --check

      - name: Verify AI SDK v3 meta conventions
        run: dart run tool/check_v3_meta.dart --check

      - name: Verify AI SDK v3 meta upstream provenance is consistent
        run: dart run tool/backfill_v3_meta_upstream.dart --check

      - name: Verify AI SDK v3 parts goldens are up to date
        run: dart run tool/update_v3_goldens.dart --check

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: dart analyze --fatal-infos

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Run tests
        run: dart test -j 1

  test-coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Install coverage
        run: dart pub global activate coverage

      - name: Run tests with coverage
        run: dart test --coverage=coverage --concurrency=1

      - name: Convert coverage to LCOV
        run: dart pub global run coverage:format_coverage --lcov --in=coverage --out=coverage/lcov.info --packages=.dart_tool/package_config.json --report-on=lib

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
        continue-on-error: true

  publish-dry-run:
    name: Publish Dry Run
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Dry run pub publish
        run: dart pub publish --dry-run
